<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organicart | Fresh Groceries</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="brand">Organicart</a>
            <div class="nav-links">
                <a href="/">Products</a>
                <a href="/cart.html" style="position:relative;">
                    <i class="fas fa-shopping-cart"></i> Cart
                    <span id="cart-badge" class="badge" style="display: none;">0</span>
                </a>
                <div id="auth-links">
                    <a href="/login.html">Login</a>
                    <a href="/register.html" class="btn btn-primary" style="color:white;">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero container">
        <h1>Elevate Your Tech Experience.</h1>
        <p>Discover our curated collection of premium gadgets designed to enhance your digital lifestyle. Immerse yourself in the future.</p>
        <a href="#products" class="btn btn-primary">Shop Collection <i class="fas fa-arrow-right"></i></a>
    </header>

    <section id="products" class="products-section container">
        <h2 class="section-title">Latest Arrivals</h2>
        <div id="products-grid" class="grid">
            <div class="spinner"></div> <!-- Loading State -->
        </div>
    </section>

    <div id="toast-container"></div>

    <script src="/js/app.js"></script>
</body>
</html>
